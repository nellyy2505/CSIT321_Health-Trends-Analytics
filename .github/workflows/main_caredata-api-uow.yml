# Docs: https://github.com/Azure/webapps-deploy
# Backend code: Caredata-Visualization-Azure/Backend (not repo root).

name: Build and deploy Python app to Azure Web App - caredata-api-uow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create and Start virtual environment and Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          BACKEND="${GITHUB_WORKSPACE}/Caredata-Visualization-Azure/Backend"
          echo "Repo root:" && ls -la "${GITHUB_WORKSPACE}"
          echo "Backend:" && ls -la "${BACKEND}"
          test -f "${BACKEND}/requirements.txt"
          cd "${BACKEND}"
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            Caredata-Visualization-Azure/Backend
            !Caredata-Visualization-Azure/Backend/antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: List deployed tree (debug)
        shell: bash
        run: |
          find "${GITHUB_WORKSPACE}" -maxdepth 5 -type f 2>/dev/null | head -40

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C1954F22F43844B5BB952CCF5E6F74F8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4FC4B877AC74435F8FE3B42F91138857 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F174037B28424F3FB2740405CEFE9F09 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: "caredata-api-uow"
          slot-name: "Production"
          package: Caredata-Visualization-Azure/Backend
